version: "3.8"

services:

  mongodb:
    container_name: mongodb
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: microdb
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - micro-net

  user-service:
    container_name: user-service
    build:
      context: ./user-service
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - micro-net

  order-service:
    container_name: order-service
    build:
      context: ./order-service
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - micro-net

  api-gateway:
    container_name: api-gateway
    build:
      context: ./api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - order-service
    networks:
      - micro-net

  frontend:
    container_name: frontend
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
    networks:
      - micro-net

volumes:
  mongodb-data:

networks:
  micro-net:
