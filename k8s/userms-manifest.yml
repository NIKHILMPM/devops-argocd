apiVersion: apps/v1
kind: Deployment
metadata:
  name: userms-deployment
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: userms-app
  template:
    metadata:
      labels:
        app: userms-app
    spec:
      containers:
        - name: userms-app
          image: ramachandrampm/argocd-userms:latest
          ports:
            - containerPort: 3001
          env:
            - name: MONGO_URL
              value: mongodb://mongodb:27017/microdb
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: userms-service
  namespace: dev
spec:
  selector:
    app: userms-app
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: userms-hpa
  namespace: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: userms-deployment
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50

