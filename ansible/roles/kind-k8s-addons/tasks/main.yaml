---
############################
# Install NGINX Ingress
############################

- name: Install NGINX Ingress for kind
  command: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
  register: ingress_install
  changed_when: "'created' in ingress_install.stdout"
  ignore_errors: yes

- name: Wait for ingress controller to be ready
  command: kubectl wait --namespace ingress-nginx \
           --for=condition=ready pod \
           --selector=app.kubernetes.io/component=controller \
           --timeout=180s
  ignore_errors: yes


############################
# Install Metrics Server
############################

- name: Install Metrics Server
  command: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
  ignore_errors: yes

- name: Patch Metrics Server for kind (insecure TLS)
  command: kubectl patch deployment metrics-server -n kube-system \
           --type=json \
           -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
  ignore_errors: yes


############################
# Install Argo CD
############################

- name: Create ArgoCD namespace
  command: kubectl create namespace argocd
  ignore_errors: yes

- name: Install ArgoCD
  command: kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v2.11.4/manifests/install.yaml
  ignore_errors: yes

- name: Wait for ArgoCD server to be ready
  command: kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s
  ignore_errors: yes


############################
# Install Prometheus + Grafana via Helm
############################

- name: Add Prometheus Helm repo
  command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  ignore_errors: yes

- name: Update Helm repos
  command: helm repo update
  ignore_errors: yes

- name: Install kube-prometheus-stack
  command: >
    helm upgrade --install monitoring prometheus-community/kube-prometheus-stack
    --namespace monitoring
    --create-namespace
  ignore_errors: yes
